# WatchUp Agent Configuration

# Unique identifier for this server/agent instance
# TODO: Set this to a meaningful name for your server
server_id: ""

# Backend API endpoint
endpoint: "https://v2-server.watchup.site"

# How often to collect and send metrics
interval: 5s

# Which metrics to collect
metrics:
  cpu: true
  memory: true
  disk: true
  network: true
  connections: false  # Network connections monitoring (optional)

# Authentication settings
auth:
  # Where to store the authentication token
  token_file: "./agent_token"

# Port monitoring (Phase 4 - Optional)
ports:
  - port: 80
    name: "HTTP"
    host: "localhost"
    timeout: "5s"
  - port: 443
    name: "HTTPS"
    host: "localhost"
    timeout: "5s"
  - port: 22
    name: "SSH"
    host: "localhost"
    timeout: "3s"

# Latency checks (Phase 4 - Optional)
latency_checks:
  - host: "8.8.8.8"
    name: "Google DNS"
    type: "tcp"
    port: 53
    timeout: "3s"
  - host: "https://www.google.com"
    name: "Google HTTP"
    type: "http"
    timeout: "10s"
  - host: "v2-server.watchup.site"
    name: "Watchup API"
    type: "tcp"
    port: 443
    timeout: "5s"